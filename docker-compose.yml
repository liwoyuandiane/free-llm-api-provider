services:
  flap:
    build: .
    container_name: free-llm-api-provider
    ports:
      - "0.0.0.0:4002:4002"
    volumes:
      - ./:/app/data
    environment:
      - DATA_DIR=/app/data
      - FLAP_API_KEY=${FLAP_API_KEY:-sk-e66835d26643a81522644d779b6ae0db83092aef0a45c46d3bef7f3f4128bca8}
      - FLAP_ADMIN_PASSWORD=${FLAP_ADMIN_PASSWORD:-834a0b03cc6b1a94}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4002/health').then(r=>process.exit(r.ok?0:1))"]
      interval: 30s
      timeout: 5s
      retries: 3
